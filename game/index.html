<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="description" content="スマートフォン向けADVゲーム『バズーカ王国物語』">
  <title>バズーカ王国物語｜第一章</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- タイトル画像は CSS の背景として読み込み、コンテンツと分離しています。 -->
  <main class="title-screen">
    <section class="title-panel" aria-labelledby="game-title">
      <header class="title-header">
        <p class="title-ornament" aria-hidden="true">◆</p>
        <h1 id="game-title">バズーカ王国物語</h1>
        <p class="chapter">第一章</p>
      </header>

      <nav class="title-menu" aria-label="タイトルメニュー">
        <button id="start-button" class="menu-button" type="button">はじめから</button>
        <button class="menu-button" type="button" disabled aria-describedby="coming-soon">つづき</button>
        <button class="menu-button" type="button" disabled aria-describedby="coming-soon">設定</button>
      </nav>

      <p id="coming-soon" class="visually-hidden">この機能は準備中です</p>
    </section>
  </main>

  <script src="main.js"></script>
</body>
</html>

<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#150e24">
  <title>バズーカ王国物語</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game-shell" aria-live="polite">
    <section id="title-screen" class="screen title-screen is-active" aria-labelledby="game-title">
      <div class="title-glow" aria-hidden="true"></div>
      <div class="title-copy">
        <p class="title-kicker">BAZOOKA KINGDOM</p>
        <h1 id="game-title">バズーカ<br>王国物語</h1>
        <p class="chapter">第一章</p>
      </div>

      <nav class="menu" aria-label="メインメニュー">
        <button id="start-button" class="menu-button menu-button--primary" type="button">はじめから</button>
        <button class="menu-button" type="button" disabled>つづき</button>
        <button class="menu-button" type="button" disabled>設定</button>
      </nav>
      <p class="version">© バズーカ王国</p>
    </section>

    <section id="novel-screen" class="screen novel-screen" aria-label="物語">
      <div id="scene-label" class="scene-label"></div>
      <button id="back-button" class="back-button" type="button" aria-label="タイトルへ戻る">←</button>
      <div class="novel-gradient" aria-hidden="true"></div>
      <button id="dialogue-box" class="dialogue-box" type="button" aria-label="次へ進む">
        <span id="speaker" class="speaker"></span>
        <span id="dialogue" class="dialogue">読み込み中…</span>
        <span class="next-mark" aria-hidden="true">▼</span>
      </button>
      <p id="load-error" class="load-error" role="alert"></p>
    </section>
  </main>

  <script src="main.js"></script>
</body>
</html>

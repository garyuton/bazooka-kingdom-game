<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="description" content="バズーカ王国物語 ノベルゲーム画面">
  <title>物語｜バズーカ王国物語</title>
  <link rel="stylesheet" href="story.css">
</head>
<body>
  <main id="novel-game" class="novel-game" aria-label="ノベルゲーム">
    <!-- 背景と立ち絵を別レイヤーにし、個別に差し替えられる構造です。 -->
    <div id="background-layer" class="background-layer" aria-hidden="true"></div>
    <div id="background-placeholder" class="background-placeholder" aria-hidden="true">
      <span>BAZOOKA KINGDOM</span>
    </div>

    <div id="character-layer" class="character-layer" aria-hidden="true">
      <img id="character-left" class="character character--left" alt="">
      <img id="character-center" class="character character--center" alt="">
      <img id="character-right" class="character character--right" alt="">
      <div id="character-placeholder" class="character-placeholder">
        <span class="placeholder-crown">♛</span>
        <span class="placeholder-face">●</span>
        <span id="character-placeholder-name" class="placeholder-name"></span>
      </div>
    </div>

    <div id="scene-fader" class="scene-fader" aria-hidden="true"></div>

    <header class="game-controls">
      <button id="back-button" class="control-button" type="button">タイトルへ戻る</button>
    </header>

    <!-- 画面の余白を含む舞台全体をタップ領域にします。 -->
    <button id="advance-layer" class="advance-layer" type="button" aria-label="セリフを進める">
      <section class="dialogue-panel" aria-live="polite">
        <p id="speaker-name" class="speaker-name"></p>
        <p id="dialogue-text" class="dialogue-text">シナリオを読み込んでいます…</p>
        <span class="advance-mark" aria-hidden="true">▼</span>
      </section>
    </button>

    <p id="error-message" class="error-message" role="alert"></p>
  </main>

  <script src="story.js"></script>
</body>
</html>
